name: CI

# Lightweight checks on PRs only. Direct pushes to main skip CI — release.yml
# handles tagged commits with the full bundle matrix, and there's no point
# running both on the same commit.
on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libsecret-1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci
      - run: npx tsc --noEmit
      - run: cargo check --manifest-path src-tauri/Cargo.toml
